<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="2400" height="3600">
  <defs>
    <linearGradient id="g-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8c84a"/>
      <stop offset="25%"  stop-color="#f7e28a"/>
      <stop offset="55%"  stop-color="#c9a030"/>
      <stop offset="100%" stop-color="#e8c84a"/>
    </linearGradient>
    <linearGradient id="g-ivory-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fdfaf0"/>
      <stop offset="100%" stop-color="#f7f2e2"/>
    </linearGradient>
    <linearGradient id="g-ivory-bot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f7f2e2"/>
      <stop offset="100%" stop-color="#fdfaf0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Border background panels ── -->
  <rect x="0"   y="0"    width="800" height="130" fill="url(#g-ivory-top)"/>
  <rect x="0"   y="1070" width="800" height="130" fill="url(#g-ivory-bot)"/>
  <rect x="0"   y="130"  width="50"  height="940" fill="#f9f4e5"/>
  <rect x="750" y="130"  width="50"  height="940" fill="#f9f4e5"/>

  <!-- ── Outer gold frame ── -->
  <rect x="8"  y="8"  width="784" height="1184" fill="none" stroke="url(#g-gold)" stroke-width="5"/>
  <rect x="15" y="15" width="770" height="1170" fill="none" stroke="#e8c84a" stroke-width="1.2" opacity="0.5"/>

  <!-- ── Inner frame (around hole) ── -->
  <rect x="46" y="126" width="708" height="948" fill="none" stroke="url(#g-gold)" stroke-width="3.5"/>
  <rect x="52" y="132" width="696" height="936" fill="none" stroke="#f7e28a" stroke-width="0.8" opacity="0.6"/>

  <!-- ══ TOP CENTER botanical cluster ══ -->
  <g transform="translate(400,65)">
    <!-- Stem -->
    <line x1="0" y1="-50" x2="0" y2="55" stroke="#b8912a" stroke-width="1.5"/>
    <!-- Center leaf up -->
    <path d="M0,-50 C12,-32 14,-14 0,2 C-14,-14 -12,-32 0,-50" fill="#c9a030" opacity="0.85"/>
    <!-- Left leaf -->
    <path d="M-5,-30 C-22,-18 -32,0 -22,14 C-10,4 -4,-14 -5,-30" fill="#c9a030" opacity="0.75"/>
    <!-- Right leaf -->
    <path d="M5,-30 C22,-18 32,0 22,14 C10,4 4,-14 5,-30" fill="#c9a030" opacity="0.75"/>
    <!-- Far left -->
    <path d="M-18,-10 C-38,2 -48,22 -36,34 C-24,20 -16,2 -18,-10" fill="#c9a030" opacity="0.6"/>
    <!-- Far right -->
    <path d="M18,-10 C38,2 48,22 36,34 C24,20 16,2 18,-10" fill="#c9a030" opacity="0.6"/>
    <!-- Flower left -->
    <circle cx="-68" cy="10"  r="11" fill="#e8c84a" opacity="0.5"/>
    <circle cx="-68" cy="10"  r="5"  fill="#fdfaf0" opacity="0.9"/>
    <!-- Flower right -->
    <circle cx="68"  cy="10"  r="11" fill="#e8c84a" opacity="0.5"/>
    <circle cx="68"  cy="10"  r="5"  fill="#fdfaf0" opacity="0.9"/>
    <!-- Dot accents -->
    <circle cx="-90" cy="-5" r="3.5" fill="#c9a030" opacity="0.5"/>
    <circle cx="90"  cy="-5" r="3.5" fill="#c9a030" opacity="0.5"/>
    <circle cx="-108" cy="18" r="2.5" fill="#c9a030" opacity="0.4"/>
    <circle cx="108"  cy="18" r="2.5" fill="#c9a030" opacity="0.4"/>
    <!-- Vine tendril left -->
    <path d="M-110,25 C-125,32 -130,45 -120,50" fill="none" stroke="#b8912a" stroke-width="1.2" opacity="0.5"/>
    <path d="M110,25 C125,32 130,45 120,50" fill="none" stroke="#b8912a" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- ══ BOTTOM CENTER botanical cluster (mirrored) ══ -->
  <g transform="translate(400,1135) rotate(180)">
    <line x1="0" y1="-50" x2="0" y2="55" stroke="#b8912a" stroke-width="1.5"/>
    <path d="M0,-50 C12,-32 14,-14 0,2 C-14,-14 -12,-32 0,-50" fill="#c9a030" opacity="0.85"/>
    <path d="M-5,-30 C-22,-18 -32,0 -22,14 C-10,4 -4,-14 -5,-30" fill="#c9a030" opacity="0.75"/>
    <path d="M5,-30 C22,-18 32,0 22,14 C10,4 4,-14 5,-30" fill="#c9a030" opacity="0.75"/>
    <path d="M-18,-10 C-38,2 -48,22 -36,34 C-24,20 -16,2 -18,-10" fill="#c9a030" opacity="0.6"/>
    <path d="M18,-10 C38,2 48,22 36,34 C24,20 16,2 18,-10" fill="#c9a030" opacity="0.6"/>
    <circle cx="-68" cy="10"  r="11" fill="#e8c84a" opacity="0.5"/>
    <circle cx="-68" cy="10"  r="5"  fill="#fdfaf0" opacity="0.9"/>
    <circle cx="68"  cy="10"  r="11" fill="#e8c84a" opacity="0.5"/>
    <circle cx="68"  cy="10"  r="5"  fill="#fdfaf0" opacity="0.9"/>
    <circle cx="-90" cy="-5" r="3.5" fill="#c9a030" opacity="0.5"/>
    <circle cx="90"  cy="-5" r="3.5" fill="#c9a030" opacity="0.5"/>
  </g>

  <!-- ══ CORNER rosettes ══ -->
  <!-- Top-left -->
  <g transform="translate(34,34)">
    <circle r="18" fill="url(#g-gold)" filter="url(#glow)"/>
    <circle r="11" fill="#fdfaf0"/>
    <circle r="5"  fill="#c9a030"/>
    <line x1="18"  y1="0"  x2="38" y2="0"  stroke="#c9a030" stroke-width="1.2" opacity="0.6"/>
    <line x1="0"   y1="18" x2="0"  y2="38" stroke="#c9a030" stroke-width="1.2" opacity="0.6"/>
  </g>
  <!-- Top-right -->
  <g transform="translate(766,34)">
    <circle r="18" fill="url(#g-gold)" filter="url(#glow)"/>
    <circle r="11" fill="#fdfaf0"/>
    <circle r="5"  fill="#c9a030"/>
    <line x1="-18" y1="0"  x2="-38" y2="0"  stroke="#c9a030" stroke-width="1.2" opacity="0.6"/>
    <line x1="0"   y1="18" x2="0"   y2="38" stroke="#c9a030" stroke-width="1.2" opacity="0.6"/>
  </g>
  <!-- Bottom-left -->
  <g transform="translate(34,1166)">
    <circle r="18" fill="url(#g-gold)" filter="url(#glow)"/>
    <circle r="11" fill="#fdfaf0"/>
    <circle r="5"  fill="#c9a030"/>
    <line x1="18"  y1="0"  x2="38" y2="0"   stroke="#c9a030" stroke-width="1.2" opacity="0.6"/>
    <line x1="0"   y1="-18" x2="0" y2="-38" stroke="#c9a030" stroke-width="1.2" opacity="0.6"/>
  </g>
  <!-- Bottom-right -->
  <g transform="translate(766,1166)">
    <circle r="18" fill="url(#g-gold)" filter="url(#glow)"/>
    <circle r="11" fill="#fdfaf0"/>
    <circle r="5"  fill="#c9a030"/>
    <line x1="-18" y1="0"   x2="-38" y2="0"  stroke="#c9a030" stroke-width="1.2" opacity="0.6"/>
    <line x1="0"   y1="-18" x2="0"   y2="-38" stroke="#c9a030" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- ══ Hole-corner leaf sprigs ══ -->
  <!-- Top-left hole corner -->
  <g transform="translate(50,130)">
    <path d="M0,0 C-14,-22 -28,-36 -14,-46 C2,-30 4,-12 0,0"  fill="#c9a030" opacity="0.7"/>
    <path d="M0,0 C18,-14 38,-16 42,-4 C28,4  12,4  0,0"      fill="#c9a030" opacity="0.7"/>
    <circle r="4" fill="#e8c84a"/>
  </g>
  <!-- Top-right hole corner -->
  <g transform="translate(750,130) scale(-1,1)">
    <path d="M0,0 C-14,-22 -28,-36 -14,-46 C2,-30 4,-12 0,0"  fill="#c9a030" opacity="0.7"/>
    <path d="M0,0 C18,-14 38,-16 42,-4 C28,4  12,4  0,0"      fill="#c9a030" opacity="0.7"/>
    <circle r="4" fill="#e8c84a"/>
  </g>
  <!-- Bottom-left hole corner -->
  <g transform="translate(50,1070) scale(1,-1)">
    <path d="M0,0 C-14,-22 -28,-36 -14,-46 C2,-30 4,-12 0,0"  fill="#c9a030" opacity="0.7"/>
    <path d="M0,0 C18,-14 38,-16 42,-4 C28,4  12,4  0,0"      fill="#c9a030" opacity="0.7"/>
    <circle r="4" fill="#e8c84a"/>
  </g>
  <!-- Bottom-right hole corner -->
  <g transform="translate(750,1070) scale(-1,-1)">
    <path d="M0,0 C-14,-22 -28,-36 -14,-46 C2,-30 4,-12 0,0"  fill="#c9a030" opacity="0.7"/>
    <path d="M0,0 C18,-14 38,-16 42,-4 C28,4  12,4  0,0"      fill="#c9a030" opacity="0.7"/>
    <circle r="4" fill="#e8c84a"/>
  </g>

  <!-- ══ Left & right side vines ══ -->
  <g opacity="0.55">
    <!-- Left vine -->
    <path d="M25,200 C30,240 20,280 25,320 C30,360 20,400 25,440 C30,480 20,520 25,560 C30,600 20,640 25,680 C30,720 20,760 25,800 C30,840 20,880 25,920 C30,960 20,1000 25,1040"
          fill="none" stroke="#b8912a" stroke-width="1.8"/>
    <path d="M25,260 C8,250 4,232 16,226"   fill="#c9a030"/>
    <path d="M25,340 C42,330 46,312 34,306" fill="#c9a030"/>
    <path d="M25,420 C8,410 4,392 16,386"   fill="#c9a030"/>
    <path d="M25,500 C42,490 46,472 34,466" fill="#c9a030"/>
    <path d="M25,580 C8,570 4,552 16,546"   fill="#c9a030"/>
    <path d="M25,660 C42,650 46,632 34,626" fill="#c9a030"/>
    <path d="M25,740 C8,730 4,712 16,706"   fill="#c9a030"/>
    <path d="M25,820 C42,810 46,792 34,786" fill="#c9a030"/>
    <path d="M25,900 C8,890 4,872 16,866"   fill="#c9a030"/>
    <path d="M25,980 C42,970 46,952 34,946" fill="#c9a030"/>
    <!-- Right vine (mirror) -->
    <path d="M775,200 C770,240 780,280 775,320 C770,360 780,400 775,440 C770,480 780,520 775,560 C770,600 780,640 775,680 C770,720 780,760 775,800 C770,840 780,880 775,920 C770,960 780,1000 775,1040"
          fill="none" stroke="#b8912a" stroke-width="1.8"/>
    <path d="M775,260 C792,250 796,232 784,226"   fill="#c9a030"/>
    <path d="M775,340 C758,330 754,312 766,306"   fill="#c9a030"/>
    <path d="M775,420 C792,410 796,392 784,386"   fill="#c9a030"/>
    <path d="M775,500 C758,490 754,472 766,466"   fill="#c9a030"/>
    <path d="M775,580 C792,570 796,552 784,546"   fill="#c9a030"/>
    <path d="M775,660 C758,650 754,632 766,626"   fill="#c9a030"/>
    <path d="M775,740 C792,730 796,712 784,706"   fill="#c9a030"/>
    <path d="M775,820 C758,810 754,792 766,786"   fill="#c9a030"/>
    <path d="M775,900 C792,890 796,872 784,866"   fill="#c9a030"/>
    <path d="M775,980 C758,970 754,952 766,946"   fill="#c9a030"/>
  </g>
</svg>
