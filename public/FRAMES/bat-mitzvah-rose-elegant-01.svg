<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="2400" height="3600">
  <!-- bat-mitzvah-rose-elegant-01: White frame, soft rose border lines, five-petal flower at bottom strip -->

  <!-- White border area — center (x=20,y=20,w=760,h=860) stays transparent -->
  <rect x="0"   y="0"    width="800" height="20"  fill="#ffffff"/>
  <rect x="0"   y="880"  width="800" height="320" fill="#ffffff"/>
  <rect x="0"   y="20"   width="20"  height="860" fill="#ffffff"/>
  <rect x="780" y="20"   width="20"  height="860" fill="#ffffff"/>

  <!-- Outer rose border -->
  <rect x="0"   y="0"    width="800" height="2"    fill="#c97b8a"/>
  <rect x="0"   y="1198" width="800" height="2"    fill="#c97b8a"/>
  <rect x="0"   y="0"    width="2"   height="1200" fill="#c97b8a"/>
  <rect x="798" y="0"    width="2"   height="1200" fill="#c97b8a"/>

  <!-- Inner rose hairline (9px inset) -->
  <rect x="9"   y="9"      width="782" height="0.8"  fill="#c97b8a" opacity="0.4"/>
  <rect x="9"   y="1190.2" width="782" height="0.8"  fill="#c97b8a" opacity="0.4"/>
  <rect x="9"   y="9"      width="0.8" height="1182" fill="#c97b8a" opacity="0.4"/>
  <rect x="790.2" y="9"    width="0.8" height="1182" fill="#c97b8a" opacity="0.4"/>

  <!-- Photo hole edge hairline -->
  <rect x="20" y="879.5" width="760" height="0.6" fill="#c97b8a" opacity="0.3"/>

  <!-- Corner micro-flourish: tiny arcs at each corner -->
  <!-- Top-left arc -->
  <path d="M 6 16 Q 6 6 16 6" fill="none" stroke="#c97b8a" stroke-width="1.2" opacity="0.7"/>
  <!-- Top-right arc -->
  <path d="M 794 6 Q 794 6 784 6 Q 794 6 794 16" fill="none" stroke="#c97b8a" stroke-width="1.2" opacity="0.7"/>
  <!-- Bottom-left arc -->
  <path d="M 6 1184 Q 6 1194 16 1194" fill="none" stroke="#c97b8a" stroke-width="1.2" opacity="0.7"/>
  <!-- Bottom-right arc -->
  <path d="M 794 1184 Q 794 1194 784 1194" fill="none" stroke="#c97b8a" stroke-width="1.2" opacity="0.7"/>

  <!-- Five-petal flower at bottom strip center -->
  <!-- Petal 1 (top) -->
  <ellipse cx="400" cy="889" rx="7" ry="12" fill="#c97b8a" opacity="0.55" transform="rotate(0 400 904)"/>
  <!-- Petal 2 (top-right) -->
  <ellipse cx="400" cy="889" rx="7" ry="12" fill="#c97b8a" opacity="0.55" transform="rotate(72 400 904)"/>
  <!-- Petal 3 (bottom-right) -->
  <ellipse cx="400" cy="889" rx="7" ry="12" fill="#c97b8a" opacity="0.55" transform="rotate(144 400 904)"/>
  <!-- Petal 4 (bottom-left) -->
  <ellipse cx="400" cy="889" rx="7" ry="12" fill="#c97b8a" opacity="0.55" transform="rotate(216 400 904)"/>
  <!-- Petal 5 (top-left) -->
  <ellipse cx="400" cy="889" rx="7" ry="12" fill="#c97b8a" opacity="0.55" transform="rotate(288 400 904)"/>
  <!-- Flower center -->
  <circle cx="400" cy="904" r="5" fill="#c97b8a" opacity="0.75"/>
  <circle cx="400" cy="904" r="2.5" fill="#ffffff" opacity="0.9"/>

  <!-- Delicate curved vines / lines left and right of flower -->
  <path d="M 50 904 C 150 898 250 910 370 904" fill="none" stroke="#c97b8a" stroke-width="0.7" opacity="0.45"/>
  <path d="M 430 904 C 550 898 650 910 750 904" fill="none" stroke="#c97b8a" stroke-width="0.7" opacity="0.45"/>

  <!-- Small petal buds at line ends -->
  <ellipse cx="52"  cy="904" rx="4" ry="6" fill="#c97b8a" opacity="0.3" transform="rotate(90 52 904)"/>
  <ellipse cx="748" cy="904" rx="4" ry="6" fill="#c97b8a" opacity="0.3" transform="rotate(90 748 904)"/>
</svg>
