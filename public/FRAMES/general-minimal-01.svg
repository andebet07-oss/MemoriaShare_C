<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="2400" height="3600">
  <defs>
    <linearGradient id="gSilverTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fcfcfc"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>
    <linearGradient id="gSilverBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#fcfcfc"/>
    </linearGradient>
  </defs>

  <!-- ── Border background panels (off-white) ── -->
  <rect x="0"   y="0"    width="800" height="130" fill="url(#gSilverTop)"/>
  <rect x="0"   y="1070" width="800" height="130" fill="url(#gSilverBot)"/>
  <rect x="0"   y="130"  width="50"  height="940" fill="#fafafa"/>
  <rect x="750" y="130"  width="50"  height="940" fill="#fafafa"/>

  <!-- ── Outer double border ── -->
  <rect x="8"  y="8"  width="784" height="1184" fill="none" stroke="#2d2d2d" stroke-width="2"/>
  <rect x="16" y="16" width="768" height="1168" fill="none" stroke="#2d2d2d" stroke-width="0.6" opacity="0.4"/>

  <!-- ── Inner border around hole ── -->
  <rect x="46" y="126" width="708" height="948" fill="none" stroke="#2d2d2d" stroke-width="1.8"/>
  <rect x="51" y="131" width="698" height="938" fill="none" stroke="#2d2d2d" stroke-width="0.5" opacity="0.35"/>

  <!-- ══ Corner bracket marks ══ -->
  <g stroke="#2d2d2d" stroke-width="2.5" fill="none">
    <!-- TL outer -->
    <polyline points="10,40 10,10 40,10"/>
    <!-- TR outer -->
    <polyline points="760,10 790,10 790,40"/>
    <!-- BL outer -->
    <polyline points="10,1160 10,1190 40,1190"/>
    <!-- BR outer -->
    <polyline points="760,1190 790,1190 790,1160"/>
  </g>
  <!-- Inner corner brackets at hole -->
  <g stroke="#2d2d2d" stroke-width="1.5" fill="none" opacity="0.5">
    <!-- TL -->
    <polyline points="50,155 50,130 76,130"/>
    <!-- TR -->
    <polyline points="724,130 750,130 750,155"/>
    <!-- BL -->
    <polyline points="50,1045 50,1070 76,1070"/>
    <!-- BR -->
    <polyline points="724,1070 750,1070 750,1045"/>
  </g>

  <!-- ══ TOP center minimal ornament ══ -->
  <!-- Simple horizontal rule with center diamond -->
  <line x1="100" y1="65" x2="344" y2="65" stroke="#2d2d2d" stroke-width="0.8" opacity="0.4"/>
  <line x1="456" y1="65" x2="700" y2="65" stroke="#2d2d2d" stroke-width="0.8" opacity="0.4"/>
  <!-- Center diamond -->
  <rect x="392" y="57" width="16" height="16" fill="none" stroke="#2d2d2d" stroke-width="1.5" transform="rotate(45,400,65)"/>
  <rect x="396" y="61" width="8"  height="8"  fill="#2d2d2d" opacity="0.6" transform="rotate(45,400,65)"/>
  <!-- Dot accents -->
  <circle cx="360" cy="65" r="2.5" fill="#2d2d2d" opacity="0.3"/>
  <circle cx="440" cy="65" r="2.5" fill="#2d2d2d" opacity="0.3"/>
  <circle cx="330" cy="65" r="1.5" fill="#2d2d2d" opacity="0.2"/>
  <circle cx="470" cy="65" r="1.5" fill="#2d2d2d" opacity="0.2"/>

  <!-- ══ BOTTOM: mirrored ornament ══ -->
  <line x1="100" y1="1135" x2="344" y2="1135" stroke="#2d2d2d" stroke-width="0.8" opacity="0.4"/>
  <line x1="456" y1="1135" x2="700" y2="1135" stroke="#2d2d2d" stroke-width="0.8" opacity="0.4"/>
  <rect x="392" y="1127" width="16" height="16" fill="none" stroke="#2d2d2d" stroke-width="1.5" transform="rotate(45,400,1135)"/>
  <rect x="396" y="1131" width="8"  height="8"  fill="#2d2d2d" opacity="0.6" transform="rotate(45,400,1135)"/>
  <circle cx="360" cy="1135" r="2.5" fill="#2d2d2d" opacity="0.3"/>
  <circle cx="440" cy="1135" r="2.5" fill="#2d2d2d" opacity="0.3"/>

  <!-- ══ SIDES: Thin tick marks ══ -->
  <g stroke="#2d2d2d" stroke-width="0.8" opacity="0.25">
    <!-- Left side -->
    <line x1="18" y1="250" x2="28" y2="250"/>
    <line x1="18" y1="350" x2="28" y2="350"/>
    <line x1="18" y1="450" x2="28" y2="450"/>
    <line x1="18" y1="550" x2="28" y2="550"/>
    <line x1="18" y1="600" x2="35" y2="600"/>
    <line x1="18" y1="650" x2="28" y2="650"/>
    <line x1="18" y1="750" x2="28" y2="750"/>
    <line x1="18" y1="850" x2="28" y2="850"/>
    <line x1="18" y1="950" x2="28" y2="950"/>
    <line x1="18" y1="1050" x2="28" y2="1050"/>
    <!-- Right side -->
    <line x1="782" y1="250" x2="772" y2="250"/>
    <line x1="782" y1="350" x2="772" y2="350"/>
    <line x1="782" y1="450" x2="772" y2="450"/>
    <line x1="782" y1="550" x2="772" y2="550"/>
    <line x1="782" y1="600" x2="765" y2="600"/>
    <line x1="782" y1="650" x2="772" y2="650"/>
    <line x1="782" y1="750" x2="772" y2="750"/>
    <line x1="782" y1="850" x2="772" y2="850"/>
    <line x1="782" y1="950" x2="772" y2="950"/>
    <line x1="782" y1="1050" x2="772" y2="1050"/>
  </g>

  <!-- ══ Outer corner small squares ══ -->
  <g fill="#2d2d2d" opacity="0.45">
    <rect x="6"   y="6"    width="6" height="6"/>
    <rect x="788" y="6"    width="6" height="6"/>
    <rect x="6"   y="1188" width="6" height="6"/>
    <rect x="788" y="1188" width="6" height="6"/>
  </g>

  <!-- ══ Subtle inner shadow on border panels ══ -->
  <rect x="0"   y="0"    width="800" height="130" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
  <rect x="0"   y="1070" width="800" height="130" fill="none" stroke="#e0e0e0" stroke-width="1" opacity="0.5"/>
</svg>
