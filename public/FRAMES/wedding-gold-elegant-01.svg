<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="2400" height="3600">
  <!-- wedding-gold-elegant-01: White frame with double gold border lines and classic wedding ornaments -->

  <!-- White border area — center (x=20,y=20,w=760,h=860) stays transparent -->
  <rect x="0"   y="0"    width="800" height="20"  fill="#ffffff"/>
  <rect x="0"   y="880"  width="800" height="320" fill="#ffffff"/>
  <rect x="0"   y="20"   width="20"  height="860" fill="#ffffff"/>
  <rect x="780" y="20"   width="20"  height="860" fill="#ffffff"/>

  <!-- Outer gold border line -->
  <rect x="0"   y="0"      width="800" height="2"    fill="#c9a96e"/>
  <rect x="0"   y="1198"   width="800" height="2"    fill="#c9a96e"/>
  <rect x="0"   y="0"      width="2"   height="1200" fill="#c9a96e"/>
  <rect x="798" y="0"      width="2"   height="1200" fill="#c9a96e"/>

  <!-- Inner gold border line (8px inset) -->
  <rect x="8"   y="8"      width="784" height="1.2"  fill="#c9a96e"/>
  <rect x="8"   y="1190.8" width="784" height="1.2"  fill="#c9a96e"/>
  <rect x="8"   y="8"      width="1.2" height="1184" fill="#c9a96e"/>
  <rect x="790.8" y="8"    width="1.2" height="1184" fill="#c9a96e"/>

  <!-- Photo hole edge: faint gold at hole boundary -->
  <rect x="20"  y="879.5" width="760" height="0.8" fill="#c9a96e" opacity="0.5"/>

  <!-- Corner ornaments — tiny gold diamond clusters at each frame corner -->
  <!-- Top-left -->
  <polygon points="14,14 18,10 22,14 18,18" fill="#c9a96e" opacity="0.8"/>
  <!-- Top-right -->
  <polygon points="786,14 782,10 778,14 782,18" fill="#c9a96e" opacity="0.8"/>
  <!-- Bottom-left -->
  <polygon points="14,1186 18,1190 22,1186 18,1182" fill="#c9a96e" opacity="0.8"/>
  <!-- Bottom-right -->
  <polygon points="786,1186 782,1190 778,1186 782,1182" fill="#c9a96e" opacity="0.8"/>

  <!-- Center ornament at top of bottom strip: two overlapping rings (wedding rings) -->
  <!-- Left ring -->
  <circle cx="386" cy="905" r="13" fill="none" stroke="#c9a96e" stroke-width="2"/>
  <!-- Right ring -->
  <circle cx="414" cy="905" r="13" fill="none" stroke="#c9a96e" stroke-width="2"/>
  <!-- Tiny diamond between rings -->
  <polygon points="400,896 404,905 400,914 396,905" fill="#c9a96e" opacity="0.4"/>

  <!-- Thin decorative line flanking the rings -->
  <line x1="50" y1="905" x2="366" y2="905" stroke="#c9a96e" stroke-width="0.7" opacity="0.6"/>
  <line x1="434" y1="905" x2="750" y2="905" stroke="#c9a96e" stroke-width="0.7" opacity="0.6"/>

  <!-- Small dot terminators at line ends -->
  <circle cx="50"  cy="905" r="2" fill="#c9a96e" opacity="0.5"/>
  <circle cx="750" cy="905" r="2" fill="#c9a96e" opacity="0.5"/>
</svg>
