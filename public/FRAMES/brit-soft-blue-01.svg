<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="2400" height="3600">
  <defs>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a8d8ea"/>
      <stop offset="50%"  stop-color="#7ec8e3"/>
      <stop offset="100%" stop-color="#a8d8ea"/>
    </linearGradient>
    <linearGradient id="gBlueTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f0f8ff"/>
      <stop offset="100%" stop-color="#e6f4fb"/>
    </linearGradient>
    <linearGradient id="gBlueSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f0f8ff"/>
      <stop offset="100%" stop-color="#e8f5fc"/>
    </linearGradient>
  </defs>

  <!-- ── Border background panels ── -->
  <rect x="0"   y="0"    width="800" height="130" fill="url(#gBlueTop)"/>
  <rect x="0"   y="1070" width="800" height="130" fill="#e8f5fc"/>
  <rect x="0"   y="130"  width="50"  height="940" fill="#f0f8ff"/>
  <rect x="750" y="130"  width="50"  height="940" fill="#f0f8ff"/>

  <!-- Soft blue top/bottom stripes -->
  <rect x="0" y="0"    width="800" height="12" fill="#7ec8e3" opacity="0.5"/>
  <rect x="0" y="12"   width="800" height="4"  fill="#a8d8ea" opacity="0.4"/>
  <rect x="0" y="1184" width="800" height="12" fill="#7ec8e3" opacity="0.5"/>
  <rect x="0" y="1180" width="800" height="4"  fill="#a8d8ea" opacity="0.4"/>

  <!-- ── Outer border ── -->
  <rect x="8"  y="20" width="784" height="1160" fill="none" stroke="#7ec8e3" stroke-width="3" rx="6"/>
  <rect x="14" y="26" width="772" height="1148" fill="none" stroke="#a8d8ea" stroke-width="1" opacity="0.5" rx="5"/>

  <!-- ── Inner border around hole ── -->
  <rect x="46" y="126" width="708" height="948" fill="none" stroke="#7ec8e3" stroke-width="2.5" rx="4"/>
  <rect x="51" y="131" width="698" height="938" fill="none" stroke="#a8d8ea" stroke-width="0.8" opacity="0.5" rx="3"/>

  <!-- ══ TOP: Star and cloud motifs ══ -->
  <!-- Stars top -->
  <g fill="#7ec8e3" opacity="0.75">
    <!-- Large center star -->
    <polygon transform="translate(400,62) rotate(5)" points="0,-28 8.2,-11.3 26.6,-8.7 13.3,4.4 16.5,22.7 0,14 -16.5,22.7 -13.3,4.4 -26.6,-8.7 -8.2,-11.3"/>
    <!-- Medium stars -->
    <polygon transform="translate(310,48) rotate(-10)" points="0,-18 5.3,-7.3 17.1,-5.6 8.6,2.8 10.6,14.6 0,9 -10.6,14.6 -8.6,2.8 -17.1,-5.6 -5.3,-7.3"/>
    <polygon transform="translate(490,48) rotate(10)" points="0,-18 5.3,-7.3 17.1,-5.6 8.6,2.8 10.6,14.6 0,9 -10.6,14.6 -8.6,2.8 -17.1,-5.6 -5.3,-7.3"/>
    <!-- Small stars -->
    <polygon transform="translate(220,70) rotate(8)" points="0,-13 3.8,-5.3 12.4,-4.1 6.2,2 7.6,10.5 0,6.5 -7.6,10.5 -6.2,2 -12.4,-4.1 -3.8,-5.3"/>
    <polygon transform="translate(580,70) rotate(-8)" points="0,-13 3.8,-5.3 12.4,-4.1 6.2,2 7.6,10.5 0,6.5 -7.6,10.5 -6.2,2 -12.4,-4.1 -3.8,-5.3"/>
    <polygon transform="translate(145,90) rotate(-5)" points="0,-10 2.9,-4 9.5,-3.1 4.8,1.5 5.9,8.1 0,5 -5.9,8.1 -4.8,1.5 -9.5,-3.1 -2.9,-4"/>
    <polygon transform="translate(655,90) rotate(5)" points="0,-10 2.9,-4 9.5,-3.1 4.8,1.5 5.9,8.1 0,5 -5.9,8.1 -4.8,1.5 -9.5,-3.1 -2.9,-4"/>
  </g>

  <!-- Cloud shapes top (left of center) -->
  <g fill="#a8d8ea" opacity="0.4">
    <ellipse cx="105" cy="55" rx="32" ry="16"/>
    <ellipse cx="90"  cy="55" rx="18" ry="12"/>
    <ellipse cx="120" cy="50" rx="18" ry="12"/>
    <!-- Cloud right -->
    <ellipse cx="695" cy="55" rx="32" ry="16"/>
    <ellipse cx="680" cy="55" rx="18" ry="12"/>
    <ellipse cx="710" cy="50" rx="18" ry="12"/>
  </g>

  <!-- Small dot twinkles -->
  <g fill="#7ec8e3" opacity="0.5">
    <circle cx="170" cy="35" r="4"/>
    <circle cx="340" cy="28" r="3"/>
    <circle cx="460" cy="28" r="3"/>
    <circle cx="630" cy="35" r="4"/>
    <circle cx="255" cy="100" r="3"/>
    <circle cx="545" cy="100" r="3"/>
  </g>

  <!-- ══ BOTTOM: Matching motifs ══ -->
  <g fill="#7ec8e3" opacity="0.75">
    <polygon transform="translate(400,1138) rotate(-5)" points="0,-28 8.2,-11.3 26.6,-8.7 13.3,4.4 16.5,22.7 0,14 -16.5,22.7 -13.3,4.4 -26.6,-8.7 -8.2,-11.3"/>
    <polygon transform="translate(310,1152) rotate(10)" points="0,-18 5.3,-7.3 17.1,-5.6 8.6,2.8 10.6,14.6 0,9 -10.6,14.6 -8.6,2.8 -17.1,-5.6 -5.3,-7.3"/>
    <polygon transform="translate(490,1152) rotate(-10)" points="0,-18 5.3,-7.3 17.1,-5.6 8.6,2.8 10.6,14.6 0,9 -10.6,14.6 -8.6,2.8 -17.1,-5.6 -5.3,-7.3"/>
    <polygon transform="translate(220,1130) rotate(-8)" points="0,-13 3.8,-5.3 12.4,-4.1 6.2,2 7.6,10.5 0,6.5 -7.6,10.5 -6.2,2 -12.4,-4.1 -3.8,-5.3"/>
    <polygon transform="translate(580,1130) rotate(8)" points="0,-13 3.8,-5.3 12.4,-4.1 6.2,2 7.6,10.5 0,6.5 -7.6,10.5 -6.2,2 -12.4,-4.1 -3.8,-5.3"/>
  </g>
  <g fill="#a8d8ea" opacity="0.4">
    <ellipse cx="105" cy="1145" rx="32" ry="16"/>
    <ellipse cx="90"  cy="1145" rx="18" ry="12"/>
    <ellipse cx="120" cy="1140" rx="18" ry="12"/>
    <ellipse cx="695" cy="1145" rx="32" ry="16"/>
    <ellipse cx="680" cy="1145" rx="18" ry="12"/>
    <ellipse cx="710" cy="1140" rx="18" ry="12"/>
  </g>

  <!-- ══ SIDES: Soft dot pattern ══ -->
  <g fill="#7ec8e3" opacity="0.45">
    <!-- Left -->
    <circle cx="25" cy="200" r="5"/>  <circle cx="25" cy="240" r="3"/>
    <circle cx="25" cy="290" r="5"/>  <circle cx="25" cy="330" r="3"/>
    <circle cx="25" cy="380" r="5"/>  <circle cx="25" cy="420" r="3"/>
    <circle cx="25" cy="470" r="5"/>  <circle cx="25" cy="510" r="3"/>
    <circle cx="25" cy="560" r="5"/>  <circle cx="25" cy="600" r="3"/>
    <circle cx="25" cy="650" r="5"/>  <circle cx="25" cy="690" r="3"/>
    <circle cx="25" cy="740" r="5"/>  <circle cx="25" cy="780" r="3"/>
    <circle cx="25" cy="830" r="5"/>  <circle cx="25" cy="870" r="3"/>
    <circle cx="25" cy="920" r="5"/>  <circle cx="25" cy="960" r="3"/>
    <circle cx="25" cy="1010" r="5"/> <circle cx="25" cy="1050" r="3"/>
    <!-- Right (mirror) -->
    <circle cx="775" cy="200" r="5"/>  <circle cx="775" cy="240" r="3"/>
    <circle cx="775" cy="290" r="5"/>  <circle cx="775" cy="330" r="3"/>
    <circle cx="775" cy="380" r="5"/>  <circle cx="775" cy="420" r="3"/>
    <circle cx="775" cy="470" r="5"/>  <circle cx="775" cy="510" r="3"/>
    <circle cx="775" cy="560" r="5"/>  <circle cx="775" cy="600" r="3"/>
    <circle cx="775" cy="650" r="5"/>  <circle cx="775" cy="690" r="3"/>
    <circle cx="775" cy="740" r="5"/>  <circle cx="775" cy="780" r="3"/>
    <circle cx="775" cy="830" r="5"/>  <circle cx="775" cy="870" r="3"/>
    <circle cx="775" cy="920" r="5"/>  <circle cx="775" cy="960" r="3"/>
    <circle cx="775" cy="1010" r="5"/> <circle cx="775" cy="1050" r="3"/>
  </g>

  <!-- ══ Corner ornaments ══ -->
  <!-- TL -->
  <circle cx="34"  cy="34"   r="22" fill="#7ec8e3" opacity="0.3"/>
  <circle cx="34"  cy="34"   r="14" fill="white" opacity="0.6"/>
  <circle cx="34"  cy="34"   r="6"  fill="#7ec8e3" opacity="0.7"/>
  <!-- TR -->
  <circle cx="766" cy="34"   r="22" fill="#7ec8e3" opacity="0.3"/>
  <circle cx="766" cy="34"   r="14" fill="white" opacity="0.6"/>
  <circle cx="766" cy="34"   r="6"  fill="#7ec8e3" opacity="0.7"/>
  <!-- BL -->
  <circle cx="34"  cy="1166" r="22" fill="#7ec8e3" opacity="0.3"/>
  <circle cx="34"  cy="1166" r="14" fill="white" opacity="0.6"/>
  <circle cx="34"  cy="1166" r="6"  fill="#7ec8e3" opacity="0.7"/>
  <!-- BR -->
  <circle cx="766" cy="1166" r="22" fill="#7ec8e3" opacity="0.3"/>
  <circle cx="766" cy="1166" r="14" fill="white" opacity="0.6"/>
  <circle cx="766" cy="1166" r="6"  fill="#7ec8e3" opacity="0.7"/>

  <!-- ══ Hole corner dots ══ -->
  <circle cx="50"  cy="130"  r="7" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="750" cy="130"  r="7" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="50"  cy="1070" r="7" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="750" cy="1070" r="7" fill="#7ec8e3" opacity="0.6"/>
</svg>
