<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="2400" height="3600">
  <defs>
    <linearGradient id="gCoral" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff7b6b"/>
      <stop offset="50%"  stop-color="#ff9a57"/>
      <stop offset="100%" stop-color="#ff7b6b"/>
    </linearGradient>
    <linearGradient id="gGold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffcc44"/>
      <stop offset="100%" stop-color="#ffaa22"/>
    </linearGradient>
    <linearGradient id="gWhiteTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff8f5"/>
    </linearGradient>
  </defs>

  <!-- ── Border background panels ── -->
  <rect x="0"   y="0"    width="800" height="130" fill="url(#gWhiteTop)"/>
  <rect x="0"   y="1070" width="800" height="130" fill="#fff8f5"/>
  <rect x="0"   y="130"  width="50"  height="940" fill="#ffffff"/>
  <rect x="750" y="130"  width="50"  height="940" fill="#ffffff"/>

  <!-- Coral accent bar top -->
  <rect x="0" y="0"  width="800" height="18" fill="url(#gCoral)"/>
  <rect x="0" y="18" width="800" height="6"  fill="#ffcc44" opacity="0.6"/>
  <!-- Coral accent bar bottom -->
  <rect x="0" y="1182" width="800" height="18" fill="url(#gCoral)"/>
  <rect x="0" y="1176" width="800" height="6"  fill="#ffcc44" opacity="0.6"/>

  <!-- ── Outer coral border ── -->
  <rect x="8"  y="26" width="784" height="1148" fill="none" stroke="#ff7b6b" stroke-width="3.5" rx="4"/>
  <rect x="14" y="32" width="772" height="1136" fill="none" stroke="#ffcc44" stroke-width="1" opacity="0.5" rx="3"/>

  <!-- ── Inner border around hole ── -->
  <rect x="46" y="126" width="708" height="948" fill="none" stroke="#ff7b6b" stroke-width="2.5" rx="3"/>
  <rect x="51" y="131" width="698" height="938" fill="none" stroke="#ffcc44" stroke-width="0.8" opacity="0.5" rx="2"/>

  <!-- ══ Stars scattered in border areas ══ -->
  <!-- 5-pointed star helper: points of a star at cx,cy radius r -->
  <!-- Top area stars -->
  <g fill="#ffcc44" opacity="0.85">
    <!-- Star TL -->
    <polygon transform="translate(80,55) rotate(15)" points="0,-20 5.9,-8.1 19.0,-6.2 9.5,3.1 11.8,16.2 0,10 -11.8,16.2 -9.5,3.1 -19.0,-6.2 -5.9,-8.1"/>
    <!-- Star TR -->
    <polygon transform="translate(720,55) rotate(-10)" points="0,-20 5.9,-8.1 19.0,-6.2 9.5,3.1 11.8,16.2 0,10 -11.8,16.2 -9.5,3.1 -19.0,-6.2 -5.9,-8.1"/>
    <!-- Star TL small -->
    <polygon transform="translate(140,38) rotate(5)" points="0,-12 3.5,-4.9 11.4,-3.7 5.7,1.9 7.1,9.7 0,6 -7.1,9.7 -5.7,1.9 -11.4,-3.7 -3.5,-4.9"/>
    <!-- Star TR small -->
    <polygon transform="translate(660,38) rotate(-5)" points="0,-12 3.5,-4.9 11.4,-3.7 5.7,1.9 7.1,9.7 0,6 -7.1,9.7 -5.7,1.9 -11.4,-3.7 -3.5,-4.9"/>
    <!-- Center top area -->
    <polygon transform="translate(280,85) rotate(20)" points="0,-10 2.9,-4 9.5,-3.1 4.8,1.5 5.9,8.1 0,5 -5.9,8.1 -4.8,1.5 -9.5,-3.1 -2.9,-4"/>
    <polygon transform="translate(520,85) rotate(-15)" points="0,-10 2.9,-4 9.5,-3.1 4.8,1.5 5.9,8.1 0,5 -5.9,8.1 -4.8,1.5 -9.5,-3.1 -2.9,-4"/>
    <polygon transform="translate(200,100) rotate(8)" points="0,-8 2.4,-3.3 7.6,-2.5 3.8,1.2 4.7,6.5 0,4 -4.7,6.5 -3.8,1.2 -7.6,-2.5 -2.4,-3.3"/>
    <polygon transform="translate(600,100) rotate(-8)" points="0,-8 2.4,-3.3 7.6,-2.5 3.8,1.2 4.7,6.5 0,4 -4.7,6.5 -3.8,1.2 -7.6,-2.5 -2.4,-3.3"/>
  </g>
  <!-- Coral accent stars -->
  <g fill="#ff7b6b" opacity="0.6">
    <polygon transform="translate(355,75) rotate(10)" points="0,-14 4.1,-5.7 13.3,-4.3 6.7,2.2 8.2,11.3 0,7 -8.2,11.3 -6.7,2.2 -13.3,-4.3 -4.1,-5.7"/>
    <polygon transform="translate(445,75) rotate(-10)" points="0,-14 4.1,-5.7 13.3,-4.3 6.7,2.2 8.2,11.3 0,7 -8.2,11.3 -6.7,2.2 -13.3,-4.3 -4.1,-5.7"/>
  </g>

  <!-- Bottom area stars -->
  <g fill="#ffcc44" opacity="0.85">
    <polygon transform="translate(80,1145) rotate(-15)"  points="0,-20 5.9,-8.1 19.0,-6.2 9.5,3.1 11.8,16.2 0,10 -11.8,16.2 -9.5,3.1 -19.0,-6.2 -5.9,-8.1"/>
    <polygon transform="translate(720,1145) rotate(10)"  points="0,-20 5.9,-8.1 19.0,-6.2 9.5,3.1 11.8,16.2 0,10 -11.8,16.2 -9.5,3.1 -19.0,-6.2 -5.9,-8.1"/>
    <polygon transform="translate(400,1140) rotate(5)"   points="0,-18 5.3,-7.3 17.1,-5.6 8.6,2.8 10.6,14.6 0,9 -10.6,14.6 -8.6,2.8 -17.1,-5.6 -5.3,-7.3"/>
    <polygon transform="translate(260,1155) rotate(-8)"  points="0,-10 2.9,-4 9.5,-3.1 4.8,1.5 5.9,8.1 0,5 -5.9,8.1 -4.8,1.5 -9.5,-3.1 -2.9,-4"/>
    <polygon transform="translate(540,1155) rotate(8)"   points="0,-10 2.9,-4 9.5,-3.1 4.8,1.5 5.9,8.1 0,5 -5.9,8.1 -4.8,1.5 -9.5,-3.1 -2.9,-4"/>
  </g>

  <!-- ══ Confetti dots in border areas ══ -->
  <g opacity="0.7">
    <!-- Top confetti -->
    <circle cx="175" cy="60" r="5" fill="#ff7b6b"/>
    <circle cx="310" cy="45" r="4" fill="#66d9f0"/>
    <circle cx="490" cy="45" r="4" fill="#c084fc"/>
    <circle cx="625" cy="60" r="5" fill="#ff7b6b"/>
    <circle cx="230" cy="95" r="3" fill="#ffcc44"/>
    <circle cx="570" cy="95" r="3" fill="#ffcc44"/>
    <circle cx="155" cy="85" r="3.5" fill="#c084fc"/>
    <circle cx="645" cy="85" r="3.5" fill="#66d9f0"/>
    <!-- Confetti streaks top -->
    <rect x="130" y="40" width="12" height="5" rx="2" fill="#66d9f0" opacity="0.7" transform="rotate(-20,136,42)"/>
    <rect x="590" y="55" width="12" height="5" rx="2" fill="#c084fc" opacity="0.7" transform="rotate(15,596,57)"/>
    <rect x="340" y="105" width="10" height="4" rx="2" fill="#ff7b6b" opacity="0.6" transform="rotate(-10,345,107)"/>
    <rect x="460" y="105" width="10" height="4" rx="2" fill="#ffcc44" opacity="0.6" transform="rotate(10,465,107)"/>

    <!-- Bottom confetti -->
    <circle cx="175" cy="1140" r="5" fill="#c084fc"/>
    <circle cx="625" cy="1140" r="5" fill="#66d9f0"/>
    <circle cx="310" cy="1160" r="4" fill="#ff7b6b"/>
    <circle cx="490" cy="1160" r="4" fill="#ffcc44"/>
    <rect x="130" y="1155" width="12" height="5" rx="2" fill="#66d9f0" opacity="0.7" transform="rotate(20,136,1157)"/>
    <rect x="590" y="1140" width="12" height="5" rx="2" fill="#c084fc" opacity="0.7" transform="rotate(-15,596,1142)"/>

    <!-- Left side confetti -->
    <circle cx="25" cy="280" r="4" fill="#ffcc44"/>
    <circle cx="25" cy="420" r="4" fill="#ff7b6b"/>
    <circle cx="25" cy="560" r="4" fill="#66d9f0"/>
    <circle cx="25" cy="700" r="4" fill="#c084fc"/>
    <circle cx="25" cy="840" r="4" fill="#ffcc44"/>
    <circle cx="25" cy="980" r="4" fill="#ff7b6b"/>
    <rect x="14" y="330" width="10" height="4" rx="2" fill="#c084fc" opacity="0.6" transform="rotate(30,19,332)"/>
    <rect x="14" y="470" width="10" height="4" rx="2" fill="#66d9f0" opacity="0.6" transform="rotate(-30,19,472)"/>
    <rect x="14" y="610" width="10" height="4" rx="2" fill="#ffcc44" opacity="0.6" transform="rotate(30,19,612)"/>
    <rect x="14" y="750" width="10" height="4" rx="2" fill="#ff7b6b" opacity="0.6" transform="rotate(-30,19,752)"/>
    <rect x="14" y="890" width="10" height="4" rx="2" fill="#c084fc" opacity="0.6" transform="rotate(30,19,892)"/>

    <!-- Right side confetti -->
    <circle cx="775" cy="280" r="4" fill="#c084fc"/>
    <circle cx="775" cy="420" r="4" fill="#66d9f0"/>
    <circle cx="775" cy="560" r="4" fill="#ffcc44"/>
    <circle cx="775" cy="700" r="4" fill="#ff7b6b"/>
    <circle cx="775" cy="840" r="4" fill="#c084fc"/>
    <circle cx="775" cy="980" r="4" fill="#66d9f0"/>
    <rect x="775" y="350" width="10" height="4" rx="2" fill="#ffcc44" opacity="0.6" transform="rotate(30,780,352)"/>
    <rect x="775" y="490" width="10" height="4" rx="2" fill="#ff7b6b" opacity="0.6" transform="rotate(-30,780,492)"/>
    <rect x="775" y="630" width="10" height="4" rx="2" fill="#c084fc" opacity="0.6" transform="rotate(30,780,632)"/>
    <rect x="775" y="910" width="10" height="4" rx="2" fill="#66d9f0" opacity="0.6" transform="rotate(-30,780,912)"/>
  </g>

  <!-- ══ Corner balloon dots ══ -->
  <!-- TL -->
  <circle cx="34" cy="34" r="22" fill="#ff7b6b" opacity="0.85"/>
  <circle cx="34" cy="34" r="14" fill="#ff9a57" opacity="0.6"/>
  <circle cx="34" cy="34" r="6"  fill="white" opacity="0.4"/>
  <!-- TR -->
  <circle cx="766" cy="34" r="22" fill="#ffcc44" opacity="0.85"/>
  <circle cx="766" cy="34" r="14" fill="#ffd966" opacity="0.6"/>
  <circle cx="766" cy="34" r="6"  fill="white" opacity="0.4"/>
  <!-- BL -->
  <circle cx="34"  cy="1166" r="22" fill="#c084fc" opacity="0.85"/>
  <circle cx="34"  cy="1166" r="14" fill="#d4a0fd" opacity="0.6"/>
  <circle cx="34"  cy="1166" r="6"  fill="white" opacity="0.4"/>
  <!-- BR -->
  <circle cx="766" cy="1166" r="22" fill="#66d9f0" opacity="0.85"/>
  <circle cx="766" cy="1166" r="14" fill="#93e6f5" opacity="0.6"/>
  <circle cx="766" cy="1166" r="6"  fill="white" opacity="0.4"/>

  <!-- ══ Hole corner star accent ══ -->
  <g fill="#ffcc44" opacity="0.8">
    <polygon transform="translate(50,130) rotate(15)" points="0,-12 3.5,-4.9 11.4,-3.7 5.7,1.9 7.1,9.7 0,6 -7.1,9.7 -5.7,1.9 -11.4,-3.7 -3.5,-4.9"/>
    <polygon transform="translate(750,130) rotate(-15)" points="0,-12 3.5,-4.9 11.4,-3.7 5.7,1.9 7.1,9.7 0,6 -7.1,9.7 -5.7,1.9 -11.4,-3.7 -3.5,-4.9"/>
    <polygon transform="translate(50,1070) rotate(-10)" points="0,-12 3.5,-4.9 11.4,-3.7 5.7,1.9 7.1,9.7 0,6 -7.1,9.7 -5.7,1.9 -11.4,-3.7 -3.5,-4.9"/>
    <polygon transform="translate(750,1070) rotate(10)" points="0,-12 3.5,-4.9 11.4,-3.7 5.7,1.9 7.1,9.7 0,6 -7.1,9.7 -5.7,1.9 -11.4,-3.7 -3.5,-4.9"/>
  </g>
</svg>
