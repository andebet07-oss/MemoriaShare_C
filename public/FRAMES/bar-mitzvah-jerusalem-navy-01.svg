<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="2400" height="3600">
  <defs>
    <linearGradient id="gGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e8c84a"/>
      <stop offset="40%"  stop-color="#f5d96e"/>
      <stop offset="100%" stop-color="#c9a030"/>
    </linearGradient>
    <linearGradient id="gNavyTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0f1d4a"/>
      <stop offset="100%" stop-color="#162254"/>
    </linearGradient>
    <linearGradient id="gNavyBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#162254"/>
      <stop offset="100%" stop-color="#0f1d4a"/>
    </linearGradient>
    <!-- Star of David path helper -->
  </defs>

  <!-- ── Border background panels ── -->
  <rect x="0"   y="0"    width="800" height="130" fill="url(#gNavyTop)"/>
  <rect x="0"   y="1070" width="800" height="130" fill="url(#gNavyBot)"/>
  <rect x="0"   y="130"  width="50"  height="940" fill="#142050"/>
  <rect x="750" y="130"  width="50"  height="940" fill="#142050"/>

  <!-- ── Outer gold double border ── -->
  <rect x="6"  y="6"  width="788" height="1188" fill="none" stroke="#c9a030" stroke-width="4"/>
  <rect x="13" y="13" width="774" height="1174" fill="none" stroke="#f5d96e" stroke-width="1.2" opacity="0.45"/>

  <!-- ── Inner gold border (around hole) ── -->
  <rect x="46" y="126" width="708" height="948" fill="none" stroke="#c9a030" stroke-width="3"/>
  <rect x="51" y="131" width="698" height="938" fill="none" stroke="#f5d96e" stroke-width="0.8" opacity="0.5"/>

  <!-- ── Gold geometric dot pattern in top strip ── -->
  <!-- Row of small diamonds -->
  <g fill="#c9a030" opacity="0.35">
    <rect x="120" y="20" width="8" height="8" transform="rotate(45,124,24)"/>
    <rect x="160" y="20" width="8" height="8" transform="rotate(45,164,24)"/>
    <rect x="200" y="20" width="8" height="8" transform="rotate(45,204,24)"/>
    <rect x="240" y="20" width="8" height="8" transform="rotate(45,244,24)"/>
    <rect x="280" y="20" width="8" height="8" transform="rotate(45,284,24)"/>
    <rect x="320" y="20" width="8" height="8" transform="rotate(45,324,24)"/>
    <rect x="360" y="20" width="8" height="8" transform="rotate(45,364,24)"/>
    <rect x="400" y="20" width="8" height="8" transform="rotate(45,404,24)"/>
    <rect x="440" y="20" width="8" height="8" transform="rotate(45,444,24)"/>
    <rect x="480" y="20" width="8" height="8" transform="rotate(45,484,24)"/>
    <rect x="520" y="20" width="8" height="8" transform="rotate(45,524,24)"/>
    <rect x="560" y="20" width="8" height="8" transform="rotate(45,564,24)"/>
    <rect x="600" y="20" width="8" height="8" transform="rotate(45,604,24)"/>
    <rect x="640" y="20" width="8" height="8" transform="rotate(45,644,24)"/>
    <rect x="680" y="20" width="8" height="8" transform="rotate(45,684,24)"/>
  </g>
  <!-- Same in bottom -->
  <g fill="#c9a030" opacity="0.35">
    <rect x="120" y="1172" width="8" height="8" transform="rotate(45,124,1176)"/>
    <rect x="200" y="1172" width="8" height="8" transform="rotate(45,204,1176)"/>
    <rect x="280" y="1172" width="8" height="8" transform="rotate(45,284,1176)"/>
    <rect x="360" y="1172" width="8" height="8" transform="rotate(45,364,1176)"/>
    <rect x="440" y="1172" width="8" height="8" transform="rotate(45,444,1176)"/>
    <rect x="520" y="1172" width="8" height="8" transform="rotate(45,524,1176)"/>
    <rect x="600" y="1172" width="8" height="8" transform="rotate(45,604,1176)"/>
    <rect x="680" y="1172" width="8" height="8" transform="rotate(45,684,1176)"/>
  </g>

  <!-- ══ Star of David macro - top center ══ -->
  <g transform="translate(400,65)" fill="url(#gGold)">
    <!-- Triangle up -->
    <polygon points="0,-40 35,20 -35,20" fill="none" stroke="url(#gGold)" stroke-width="3.5"/>
    <!-- Triangle down -->
    <polygon points="0,40 35,-20 -35,-20" fill="none" stroke="url(#gGold)" stroke-width="3.5"/>
    <!-- Center fill -->
    <circle r="8" fill="#c9a030" opacity="0.6"/>
    <!-- Glow dots at star points -->
    <circle cx="0"   cy="-40" r="4" fill="#f5d96e"/>
    <circle cx="35"  cy="20"  r="4" fill="#f5d96e"/>
    <circle cx="-35" cy="20"  r="4" fill="#f5d96e"/>
    <circle cx="0"   cy="40"  r="4" fill="#f5d96e"/>
    <circle cx="35"  cy="-20" r="4" fill="#f5d96e"/>
    <circle cx="-35" cy="-20" r="4" fill="#f5d96e"/>
    <!-- Rays outward -->
    <line x1="-65" y1="0" x2="-48" y2="0" stroke="#c9a030" stroke-width="1.5" opacity="0.6"/>
    <line x1="65"  y1="0" x2="48"  y2="0" stroke="#c9a030" stroke-width="1.5" opacity="0.6"/>
    <circle cx="-75" cy="0" r="3.5" fill="#c9a030" opacity="0.5"/>
    <circle cx="75"  cy="0" r="3.5" fill="#c9a030" opacity="0.5"/>
    <circle cx="-92" cy="0" r="2" fill="#c9a030" opacity="0.35"/>
    <circle cx="92"  cy="0" r="2" fill="#c9a030" opacity="0.35"/>
  </g>

  <!-- ══ Star of David - bottom center ══ -->
  <g transform="translate(400,1135)" fill="url(#gGold)">
    <polygon points="0,-40 35,20 -35,20" fill="none" stroke="url(#gGold)" stroke-width="3.5"/>
    <polygon points="0,40 35,-20 -35,-20" fill="none" stroke="url(#gGold)" stroke-width="3.5"/>
    <circle r="8" fill="#c9a030" opacity="0.6"/>
    <circle cx="0"   cy="-40" r="4" fill="#f5d96e"/>
    <circle cx="35"  cy="20"  r="4" fill="#f5d96e"/>
    <circle cx="-35" cy="20"  r="4" fill="#f5d96e"/>
    <circle cx="0"   cy="40"  r="4" fill="#f5d96e"/>
    <circle cx="35"  cy="-20" r="4" fill="#f5d96e"/>
    <circle cx="-35" cy="-20" r="4" fill="#f5d96e"/>
    <line x1="-65" y1="0" x2="-48" y2="0" stroke="#c9a030" stroke-width="1.5" opacity="0.6"/>
    <line x1="65"  y1="0" x2="48"  y2="0" stroke="#c9a030" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- ══ Corner Stars of David (small) ══ -->
  <!-- Top-left corner -->
  <g transform="translate(34,34)">
    <polygon points="0,-20 17,10 -17,10" fill="none" stroke="#c9a030" stroke-width="2"/>
    <polygon points="0,20 17,-10 -17,-10" fill="none" stroke="#c9a030" stroke-width="2"/>
    <circle r="4" fill="#c9a030"/>
  </g>
  <!-- Top-right corner -->
  <g transform="translate(766,34)">
    <polygon points="0,-20 17,10 -17,10" fill="none" stroke="#c9a030" stroke-width="2"/>
    <polygon points="0,20 17,-10 -17,-10" fill="none" stroke="#c9a030" stroke-width="2"/>
    <circle r="4" fill="#c9a030"/>
  </g>
  <!-- Bottom-left corner -->
  <g transform="translate(34,1166)">
    <polygon points="0,-20 17,10 -17,10" fill="none" stroke="#c9a030" stroke-width="2"/>
    <polygon points="0,20 17,-10 -17,-10" fill="none" stroke="#c9a030" stroke-width="2"/>
    <circle r="4" fill="#c9a030"/>
  </g>
  <!-- Bottom-right corner -->
  <g transform="translate(766,1166)">
    <polygon points="0,-20 17,10 -17,10" fill="none" stroke="#c9a030" stroke-width="2"/>
    <polygon points="0,20 17,-10 -17,-10" fill="none" stroke="#c9a030" stroke-width="2"/>
    <circle r="4" fill="#c9a030"/>
  </g>

  <!-- ══ Hole corner bracket ornaments ══ -->
  <g stroke="#c9a030" stroke-width="2" fill="none" opacity="0.8">
    <!-- TL -->
    <polyline points="72,130 50,130 50,160"/>
    <!-- TR -->
    <polyline points="728,130 750,130 750,160"/>
    <!-- BL -->
    <polyline points="72,1070 50,1070 50,1040"/>
    <!-- BR -->
    <polyline points="728,1070 750,1070 750,1040"/>
  </g>

  <!-- ══ Side meander pattern (left) ══ -->
  <g stroke="#c9a030" stroke-width="1.2" fill="none" opacity="0.3">
    <polyline points="25,200 10,200 10,220 40,220 40,240 10,240 10,260 40,260 40,280 10,280 10,300 40,300 40,320 10,320 10,340 40,340 40,360 10,360 10,380 40,380 40,400 10,400 10,420 40,420 40,440 10,440 10,460 40,460 40,480 10,480 10,500 40,500 40,520 10,520 10,540 40,540 40,560 10,560 10,580 40,580 40,600 10,600 10,620 40,620 40,640 10,640 10,660 40,660 40,680 10,680 10,700 40,700 40,720 10,720 10,740 40,740 40,760 10,760 10,780 40,780 40,800 10,800 10,820 40,820 40,840 10,840 10,860 40,860 40,880 10,880 10,900 40,900 40,920 10,920 10,940 40,940 40,960 10,960 10,980 40,980 40,1000 10,1000 10,1020 25,1020"/>
  </g>
  <!-- Right side meander (mirror) -->
  <g stroke="#c9a030" stroke-width="1.2" fill="none" opacity="0.3">
    <polyline points="775,200 790,200 790,220 760,220 760,240 790,240 790,260 760,260 760,280 790,280 790,300 760,300 760,320 790,320 790,340 760,340 760,360 790,360 790,380 760,380 760,400 790,400 790,420 760,420 760,440 790,440 790,460 760,460 760,480 790,480 790,500 760,500 760,520 790,520 790,540 760,540 760,560 790,560 790,580 760,580 760,600 790,600 790,620 760,620 760,640 790,640 790,660 760,660 760,680 790,680 790,700 760,700 760,720 790,720 790,740 760,740 760,760 790,760 790,780 760,780 760,800 790,800 790,820 760,820 760,840 790,840 790,860 760,860 760,880 790,880 790,900 760,900 760,920 790,920 790,940 760,940 760,960 790,960 790,980 760,980 760,1000 790,1000 790,1020 775,1020"/>
  </g>

  <!-- ══ Small accent dots along borders ══ -->
  <g fill="#f5d96e" opacity="0.4">
    <circle cx="110" cy="65" r="3"/>
    <circle cx="690" cy="65" r="3"/>
    <circle cx="155" cy="65" r="2"/>
    <circle cx="645" cy="65" r="2"/>
    <circle cx="110" cy="1135" r="3"/>
    <circle cx="690" cy="1135" r="3"/>
  </g>
</svg>
