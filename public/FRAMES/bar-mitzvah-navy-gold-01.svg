<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="2400" height="3600">
  <!-- bar-mitzvah-navy-gold-01: White frame, thin navy outer line, gold corner blocks, Star of David at bottom strip center -->

  <!-- White border area — center (x=20,y=20,w=760,h=860) stays transparent -->
  <rect x="0"   y="0"    width="800" height="20"  fill="#ffffff"/>
  <rect x="0"   y="880"  width="800" height="320" fill="#ffffff"/>
  <rect x="0"   y="20"   width="20"  height="860" fill="#ffffff"/>
  <rect x="780" y="20"   width="20"  height="860" fill="#ffffff"/>

  <!-- Outer navy border -->
  <rect x="0"   y="0"    width="800" height="2"    fill="#1a3a6e"/>
  <rect x="0"   y="1198" width="800" height="2"    fill="#1a3a6e"/>
  <rect x="0"   y="0"    width="2"   height="1200" fill="#1a3a6e"/>
  <rect x="798" y="0"    width="2"   height="1200" fill="#1a3a6e"/>

  <!-- Inner navy hairline (10px inset) -->
  <rect x="10"   y="10"    width="780" height="0.8"  fill="#1a3a6e" opacity="0.4"/>
  <rect x="10"   y="1189.2" width="780" height="0.8" fill="#1a3a6e" opacity="0.4"/>
  <rect x="10"   y="10"    width="0.8" height="1180" fill="#1a3a6e" opacity="0.4"/>
  <rect x="789.2" y="10"   width="0.8" height="1180" fill="#1a3a6e" opacity="0.4"/>

  <!-- Gold corner squares (4×4px at each corner, slightly inset) -->
  <rect x="4"   y="4"    width="8" height="8" fill="#c9a96e"/>
  <rect x="788" y="4"    width="8" height="8" fill="#c9a96e"/>
  <rect x="4"   y="1188" width="8" height="8" fill="#c9a96e"/>
  <rect x="788" y="1188" width="8" height="8" fill="#c9a96e"/>

  <!-- Photo hole edge hairline -->
  <rect x="20" y="879.5" width="760" height="0.6" fill="#1a3a6e" opacity="0.3"/>

  <!-- Star of David at bottom strip center (two overlapping triangles) -->
  <!-- Triangle 1 (pointing up) -->
  <polygon points="400,878 428,926 372,926" fill="none" stroke="#c9a96e" stroke-width="1.8"/>
  <!-- Triangle 2 (pointing down) -->
  <polygon points="400,930 372,882 428,882" fill="none" stroke="#c9a96e" stroke-width="1.8"/>

  <!-- Horizontal gold lines flanking the Star -->
  <line x1="50"  y1="904" x2="358" y2="904" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>
  <line x1="442" y1="904" x2="750" y2="904" stroke="#c9a96e" stroke-width="0.8" opacity="0.5"/>

  <!-- Small gold dots at line endpoints -->
  <circle cx="50"  cy="904" r="2" fill="#c9a96e" opacity="0.5"/>
  <circle cx="750" cy="904" r="2" fill="#c9a96e" opacity="0.5"/>

  <!-- Six tiny gold dots arranged as a hexagonal ring around center of star -->
  <circle cx="400" cy="870" r="1.5" fill="#c9a96e" opacity="0.6"/>
  <circle cx="414" cy="876" r="1.5" fill="#c9a96e" opacity="0.6"/>
  <circle cx="414" cy="890" r="1.5" fill="#c9a96e" opacity="0.6"/>
  <circle cx="400" cy="896" r="1.5" fill="#c9a96e" opacity="0.6"/>
  <circle cx="386" cy="890" r="1.5" fill="#c9a96e" opacity="0.6"/>
  <circle cx="386" cy="876" r="1.5" fill="#c9a96e" opacity="0.6"/>
</svg>
