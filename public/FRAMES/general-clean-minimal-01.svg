<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="2400" height="3600">
  <!-- general-clean-minimal-01: Ultra-minimal white frame, thin charcoal border, L-bracket corners, small diamond divider -->

  <!-- White border area — center (x=20,y=20,w=760,h=860) stays transparent -->
  <rect x="0"   y="0"    width="800" height="20"  fill="#ffffff"/>
  <rect x="0"   y="880"  width="800" height="320" fill="#ffffff"/>
  <rect x="0"   y="20"   width="20"  height="860" fill="#ffffff"/>
  <rect x="780" y="20"   width="20"  height="860" fill="#ffffff"/>

  <!-- Outer charcoal border (single, clean) -->
  <rect x="0"   y="0"    width="800" height="1.5"  fill="#3a3a3a"/>
  <rect x="0"   y="1198.5" width="800" height="1.5" fill="#3a3a3a"/>
  <rect x="0"   y="0"    width="1.5" height="1200" fill="#3a3a3a"/>
  <rect x="798.5" y="0"  width="1.5" height="1200" fill="#3a3a3a"/>

  <!-- Photo hole edge hairline (clean) -->
  <rect x="20" y="879.5" width="760" height="0.5" fill="#3a3a3a" opacity="0.25"/>

  <!-- L-bracket corner ornaments (4 corners, 20px legs) -->
  <!-- Top-left -->
  <rect x="6" y="6"  width="20" height="1.5" fill="#3a3a3a"/>
  <rect x="6" y="6"  width="1.5" height="20" fill="#3a3a3a"/>
  <!-- Top-right -->
  <rect x="774" y="6" width="20" height="1.5" fill="#3a3a3a"/>
  <rect x="792.5" y="6" width="1.5" height="20" fill="#3a3a3a"/>
  <!-- Bottom-left -->
  <rect x="6" y="1193.5" width="20" height="1.5" fill="#3a3a3a"/>
  <rect x="6" y="1174" width="1.5" height="20" fill="#3a3a3a"/>
  <!-- Bottom-right -->
  <rect x="774" y="1193.5" width="20" height="1.5" fill="#3a3a3a"/>
  <rect x="792.5" y="1174" width="1.5" height="20" fill="#3a3a3a"/>

  <!-- Small diamond divider at top of bottom strip -->
  <polygon points="400,883 406,892 400,901 394,892" fill="none" stroke="#3a3a3a" stroke-width="1.2" opacity="0.5"/>
  <polygon points="400,886 404,892 400,898 396,892" fill="#3a3a3a" opacity="0.18"/>

  <!-- Thin hairlines flanking diamond -->
  <line x1="50"  y1="892" x2="384" y2="892" stroke="#3a3a3a" stroke-width="0.6" opacity="0.3"/>
  <line x1="416" y1="892" x2="750" y2="892" stroke="#3a3a3a" stroke-width="0.6" opacity="0.3"/>

  <!-- Tiny dot terminators -->
  <circle cx="50"  cy="892" r="1.5" fill="#3a3a3a" opacity="0.3"/>
  <circle cx="750" cy="892" r="1.5" fill="#3a3a3a" opacity="0.3"/>
</svg>
